version: "3.8"
services:
  redis:
    build: ./redis
    image: muuzika-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    environment:
      - REDIS_PASSWORD
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "50051:50051"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
